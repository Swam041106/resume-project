/* ================= LANGUAGES ================= */
<!DOCTYPE html>
<html>
<head><title>Languages</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="nav"><a href="index.html">Home</a></div>
<div class="container">
<h1>Languages</h1>
<form>
<input placeholder="Language">
<select>
<option>Basic</option>
<option>Intermediate</option>
<option>Fluent</option>
</select>
<button type="submit">Add</button>
</form>
</div>

<script>
document.querySelector('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    language:    e.target.querySelector('input').value,
    proficiency: e.target.querySelector('select').value,
  };
  const res = await fetch('http://localhost:3000/api/languages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.success ? '✅ Language added!' : '❌ Error');
});
</script>
</body>
</html>
