<!DOCTYPE html>
<html>
<head>
  <title>Education</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <a href="index.html">Home</a>
</div>

<div class="container">
  <h1>Education</h1>
  <form>
    <input type="text" placeholder="Candidate ID">
    <input type="text" placeholder="Degree">
    <input type="text" placeholder="College">
    <input type="text" placeholder="CGPA">
    <input type="number" placeholder="Start Year">
    <input type="number" placeholder="End Year">
    <button type="submit">Add</button>
  </form>
</div>

<script>
document.querySelector('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const inputs = e.target.querySelectorAll('input');
  const body = {
    candidateId: inputs[0].value,
    degree:      inputs[1].value,
    college:     inputs[2].value,
    cgpa:        inputs[3].value,
    startYear:   inputs[4].value,
    endYear:     inputs[5].value,
  };
  const res = await fetch('http://localhost:3000/api/education', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.success ? '✅ Education added!' : '❌ Error');
});
</script>
</body>
</html>
