/* ================= CERTIFICATIONS ================= */
<!DOCTYPE html>
<html>
<head><title>Certifications</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="nav"><a href="index.html">Home</a></div>
<div class="container">
<h1>Certifications</h1>
<form>
<input placeholder="Name">
<input placeholder="Issuer">
<input type="date">
<button type="submit">Add</button>
</form>
</div>

<script>
document.querySelector('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const inputs = e.target.querySelectorAll('input');
  const body = { name: inputs[0].value, issuer: inputs[1].value, date: inputs[2].value };
  const res = await fetch('http://localhost:3000/api/certifications', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.success ? '✅ Certification added!' : '❌ Error');
});
</script>
</body>
</html>
